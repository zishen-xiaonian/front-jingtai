        const normalized = normalizeLngLat(lngLat);

        if (!MarkerCtor) {
            return;

        if (!marker) {

        const popupPayload =

        if (typeof marker.on === "function") {
            marker.on("click", openMarkerPopup);
        } else {
            markerElement.addEventListener("click", openMarkerPopup);
        }

        outageFocusMarker = marker;
    }

    function normalizeLngLat(value) {
        if (!value) {
            return null;
        }

        let lng = null;
        let lat = null;

        if (Array.isArray(value)) {
            lng = Number(value[0]);
            lat = Number(value[1]);
        } else if (typeof value.getLng === "function" && typeof value.getLat === "function") {
            lng = Number(value.getLng());
            lat = Number(value.getLat());
        } else {
            lng = Number(value.lng);
            lat = Number(value.lat);
        }

        if (!Number.isFinite(lng) || !Number.isFinite(lat)) {
            return null;
        }
        return [lng, lat];
    }

    function collectLngLatPoints(value, points) {
        if (!value) {
            return;
        }

        if (Array.isArray(value)) {
            const direct = normalizeLngLat(value);
            if (direct) {
                points.push(direct);
                return;
            }
            value.forEach((item) => collectLngLatPoints(item, points));
            return;
        }

        if (typeof value === "object") {
            const direct = normalizeLngLat(value);
            if (direct) {
                points.push(direct);
            }
        }
    }

    function getOutageRangePoints(payload) {
        const points = [];
        collectLngLatPoints(payload?.rangePoints, points);
        collectLngLatPoints(payload?.linePoints, points);
        collectLngLatPoints(payload?.affectedUsers, points);
        collectLngLatPoints(payload?.userPoints, points);
        collectLngLatPoints(payload?.stationLocation, points);
        collectLngLatPoints(payload?.substationLocation, points);
        collectLngLatPoints(payload?.center, points);
        collectLngLatPoints(payload?.lngLat, points);

        const seen = new Set();
        return points.filter((point) => {
            const key = `${point[0].toFixed(6)},${point[1].toFixed(6)}`;
            if (seen.has(key)) {
                return false;
            }
            seen.add(key);
            return true;
        });
    }

    function metersToLatDegrees(meters) {
        return meters / 111320;
    }

    function metersToLngDegrees(meters, lat) {
        const scale = Math.max(Math.cos((lat * Math.PI) / 180), 0.2);
        return meters / (111320 * scale);
    }

    function createOutageRangePolygon(points, radiusMeters) {
        const normalizedPoints = Array.isArray(points) ? points.filter(Boolean) : [];
        const radius = Math.max(Number(radiusMeters) || 1600, 900);
        const basePoint = normalizedPoints[0] || getMapCenterLngLat();

        if (normalizedPoints.length <= 1) {
            const center = basePoint;
            const lngRadius = metersToLngDegrees(radius, center[1]);
            const latRadius = metersToLatDegrees(radius);
            const coordinates = [];
            for (let index = 0; index <= 72; index += 1) {
                const angle = (index / 72) * Math.PI * 2;
                coordinates.push([
                    center[0] + Math.cos(angle) * lngRadius,
                    center[1] + Math.sin(angle) * latRadius,
                ]);
            }
            return coordinates;
        }

        const lngs = normalizedPoints.map((point) => point[0]);
        const lats = normalizedPoints.map((point) => point[1]);
        const minLng = Math.min(...lngs);
        const maxLng = Math.max(...lngs);
        const minLat = Math.min(...lats);
        const maxLat = Math.max(...lats);
        const center = [(minLng + maxLng) / 2, (minLat + maxLat) / 2];
        const lngPadding = metersToLngDegrees(radius, center[1]);
        const latPadding = metersToLatDegrees(radius);
        const lngRadius = Math.max((maxLng - minLng) / 2 + lngPadding, lngPadding);
        const latRadius = Math.max((maxLat - minLat) / 2 + latPadding, latPadding);
        const coordinates = [];

        for (let index = 0; index <= 72; index += 1) {
            const angle = (index / 72) * Math.PI * 2;
            coordinates.push([
                center[0] + Math.cos(angle) * lngRadius,
                center[1] + Math.sin(angle) * latRadius,
            ]);
        }
        return coordinates;
    }

    function clearOutageRangeOverlay() {
        if (!mapInstance) {
            return;
        }
        try {
            if (mapInstance.getLayer && mapInstance.getLayer(outageRangeLineLayerId)) {
                mapInstance.removeLayer(outageRangeLineLayerId);
            }
            if (mapInstance.getLayer && mapInstance.getLayer(outageRangeFillLayerId)) {
                mapInstance.removeLayer(outageRangeFillLayerId);
            }
            if (mapInstance.getSource && mapInstance.getSource(outageRangeSourceId)) {
                mapInstance.removeSource(outageRangeSourceId);
            }
        } catch (error) {
            console.warn("clear outage range overlay failed", error);
        }
    }

    function renderOutageRangeOverlay(payload, fallbackCenter) {
        if (!mapInstance || typeof mapInstance.addSource !== "function" || typeof mapInstance.addLayer !== "function") {
            return;
        }

        const points = getOutageRangePoints(payload);
        if (points.length === 0) {
            const center = normalizeLngLat(fallbackCenter) || getMapCenterLngLat();
            if (center) {
                points.push(center);
            }
        }
        if (points.length === 0) {
            return;
        }

        const radiusMeters = Number(payload?.rangeRadiusMeters || payload?.radiusMeters || 1600);
        const coordinates = createOutageRangePolygon(points, radiusMeters);
        const data = {
            type: "FeatureCollection",
            features: [{
                type: "Feature",
                properties: {
                    outageNumber: String(payload?.outageNumber || ""),
                },
                geometry: {
                    type: "Polygon",
                    coordinates: [coordinates],
                },
            }],
        };

        clearOutageRangeOverlay();
        try {
            mapInstance.addSource(outageRangeSourceId, {
                type: "geojson",
                data,
            });
            mapInstance.addLayer({
                id: outageRangeFillLayerId,
                type: "fill",
                source: outageRangeSourceId,
                paint: {
                    "fill-color": "#ff5a3d",
                    "fill-opacity": 0.22,
                },
            });
            mapInstance.addLayer({
                id: outageRangeLineLayerId,
                type: "line",
                source: outageRangeSourceId,
                paint: {
                    "line-color": "#ffcf5a",
                    "line-width": 3,
                    "line-opacity": 0.96,
                },
            });
        } catch (error) {
            console.warn("render outage range overlay failed", error);
        }
    }

    function getMapCenterLngLat() {
        if (!mapInstance || typeof mapInstance.getCenter !== "function") {
            return defaultCenter;
        }
        const center = normalizeLngLat(mapInstance.getCenter());
        return center || defaultCenter;
    }

        const totalUserCount = Number(device?.totalUserCount ?? importantUserCount + sensitiveUserCount);
        return `

    function getFeatureValue(feature, keys = []) {
        if (!feature || typeof feature !== "object") {
            return "";
        }
        for (let i = 0; i < keys.length; i += 1) {
            const key = keys[i];
            if (feature[key] != null && String(feature[key]).trim() !== "") {
                return String(feature[key]).trim();
            }
            const props = feature.properties;
            if (props && props[key] != null && String(props[key]).trim() !== "") {
                return String(props[key]).trim();
            }
        }
        return "";
    }

    function extractFeatureLngLat(feature, clickPayload) {
        const fromPayload = clickPayload?.lngLat || clickPayload?.lnglat || clickPayload?.point || null;
        if (fromPayload) {
            const normalized = normalizeLngLat(fromPayload);
            if (normalized) {
                return normalized;
            }
        }

        const pointCandidates = [
            feature?.lngLat,
            feature?.lnglat,
            feature?.point,
            feature?.geometry?.coordinates,
            feature?.properties?.coordinates,
        ];
        for (let i = 0; i < pointCandidates.length; i += 1) {
            const normalized = normalizeLngLat(pointCandidates[i]);
            if (normalized) {
                return normalized;
            }
        }
        return getMapCenterLngLat();
    }

    function locateOutageFeeder(payload) {

        const feederName = String(payload?.rdtFeederName || payload?.feederName || feederId).trim() || feederId;
        const feederDevType = String(payload?.devType || payload?.rdtFeederDevType || defaultFeederDevType).trim() || defaultFeederDevType;

        let result = null;

            } catch (fallbackError) {
                console.warn("fly to feeder failed", fallbackError);
                return;
            }

        if (result && typeof result.then === "function") {
            result
                .then(showPopup)
                .catch(function (error) {

    function normalizeOutageChainDevices(payload) {
        const incoming = Array.isArray(payload?.devices) ? payload.devices : [];
        const list = incoming
            .map((item) => {
                const role = String(item?.role || "").trim();
                const devId = String(item?.devId || "").trim();
                if (!devId) {
                    return null;
                }
                const fallbackType = role === "substation" ? outageChainSubstationDevType : outageChainFeederDevType;
                const rawDevType = String(item?.devType || fallbackType).trim() || fallbackType;
                const devType = role === "feeder" ? rawDevType.toLowerCase() : rawDevType;
                return {
                    role,
                    devId,
                    devType,
                    provinceId: String(item?.provinceId || outageChainProvinceId).trim() || outageChainProvinceId,
                    distribution: Number(item?.distribution ?? outageChainDistribution),
                    name: String(item?.name || "").trim(),
                };
            })
            .filter(Boolean);

        if (list.length > 0) {
            return list;
        }

        const feederId = String(payload?.rdtFeederId || payload?.feederId || "").trim();
        const substationId = String(payload?.rdtSubsId || payload?.substationId || "").trim();
        const fallback = [];
        if (feederId) {
            fallback.push({
                role: "feeder",
                devId: feederId,
                devType: outageChainFeederDevType,
                provinceId: outageChainProvinceId,
                distribution: outageChainDistribution,
                name: String(payload?.rdtFeederName || payload?.feederName || feederId).trim(),
            });
        }
        if (substationId) {
            fallback.push({
                role: "substation",
                devId: substationId,
                devType: outageChainSubstationDevType,
                provinceId: outageChainProvinceId,
                distribution: outageChainDistribution,
                name: String(payload?.rdtSubsName || payload?.substationName || substationId).trim(),
            });
        }
        return fallback;
    }

    function flyChainCandidates(candidates = []) {
        if (!psrMapInstance || typeof psrMapInstance.flyToDevices !== "function") {
            return Promise.resolve(false);
        }
        if (!Array.isArray(candidates) || candidates.length === 0) {
            return Promise.resolve(false);
        }

        let index = 0;
        const runNext = function () {
            if (index >= candidates.length) {
                return Promise.resolve(false);
            }

            const current = candidates[index];
            index += 1;
            let result = null;
            try {
                result = psrMapInstance.flyToDevices([current], { hightlight: true });
            } catch (_error) {
                return runNext();
            }

            if (result && typeof result.then === "function") {
                return result
                    .then(function () {
                        return true;
                    })
                    .catch(function () {
                        return runNext();
                    });
            }
            return Promise.resolve(true);
        };

        return runNext();
    }

    function highlightOutageChainFeeder(feeder) {
        if (!feeder) {
            return Promise.resolve(false);
        }
        const devTypeLower = String(feeder.devType || outageChainFeederDevType).trim().toLowerCase() || outageChainFeederDevType;
        const devTypeUpper = devTypeLower.toUpperCase();
        const candidates = [
            {
                devId: feeder.devId,
                devType: devTypeLower,
                provinceId: feeder.provinceId,
                distribution: feeder.distribution,
            },
            {
                devId: feeder.devId,
                devType: devTypeUpper,
                provinceId: feeder.provinceId,
                distribution: feeder.distribution,
            },
            {
                devId: feeder.devId,
                devType: devTypeLower,
            },
            {
                devId: feeder.devId,
                devType: devTypeUpper,
            },
            {
                devId: feeder.devId,
            },
        ];
        return flyChainCandidates(candidates);
    }

    function locateOutageChain(payload) {
        pendingChainLocatePayload = payload ?? null;
        activeSpaceDistributionDevice = null;
        clearOutageFocusMarker();
        const devices = normalizeOutageChainDevices(payload);
        if (devices.length === 0 || !psrMapInstance || typeof psrMapInstance.flyToDevices !== "function") {
            renderOutageRangeOverlay(payload, getMapCenterLngLat());
            return;
        }
        clearFeederPopup();
        const substation = devices.find((item) => item.role === "substation") || null;
        const feeder = devices.find((item) => item.role === "feeder") || null;
        activeOutageChainSubstation = substation
            ? {
                outageNumber: String(payload?.outageNumber || "").trim(),
                substationId: String(substation.devId || "").trim(),
                substationName: String(substation.name || substation.devId || "").trim(),
            }
            : null;
        if (!substation) {
            void highlightOutageChainFeeder(feeder).then(function () {
                renderOutageRangeOverlay(payload, getMapCenterLngLat());
            });
            return;
        }
        const flyResult = flyChainCandidates([{
            devId: substation.devId,
            devType: substation.devType,
            provinceId: substation.provinceId,
            distribution: substation.distribution,
        }]);
        const renderRange = function (delay) {
            window.setTimeout(function () {
                renderOutageRangeOverlay(payload, getMapCenterLngLat());
            }, delay);
        };
        if (flyResult && typeof flyResult.then === "function") {
            flyResult
                .then(function () {
                    renderRange(180);
                })
                .catch(function () {
                    renderRange(180);
                });
        }
        [520, 1000, 1800].forEach(renderRange);
    }

    function locateSpaceDistributionDevice(payload) {
        pendingSpaceDeviceLocatePayload = payload ?? null;
        activeOutageChainSubstation = null;
        clearFeederPopup();
        clearOutageFocusMarker();
        clearOutageRangeOverlay();

        const devId = String(payload?.devId || "").trim();
        if (!devId || !psrMapInstance || typeof psrMapInstance.flyToDevices !== "function") {
            activeSpaceDistributionDevice = null;
            return;
        }

        const devType = String(payload?.devType || "").trim();
        const provinceId = String(payload?.provinceId || outageChainProvinceId).trim() || outageChainProvinceId;
        const distribution = Number(payload?.distribution ?? outageChainDistribution);
        const importantUserCount = Math.max(Number(payload?.importantUserCount ?? 0) || 0, 0);
        const sensitiveUserCount = Math.max(Number(payload?.sensitiveUserCount ?? 0) || 0, 0);
        const totalUserCount = Math.max(
            Number(payload?.totalUserCount ?? importantUserCount + sensitiveUserCount) || 0,
            importantUserCount + sensitiveUserCount,
        );

        activeSpaceDistributionDevice = {
            devId,
            devType,
            deviceName: String(payload?.deviceName || payload?.name || devId).trim() || devId,
            importantUserCount,
            sensitiveUserCount,
            totalUserCount,
            outageSubstationName: String(payload?.outageSubstationName || "").trim(),
            feederName: String(payload?.feederName || "").trim(),
            outageLineName: String(payload?.outageLineName || "").trim(),
            beginTime: String(payload?.beginTime || "").trim() || "-",
            endTime: String(payload?.endTime || "").trim() || "-",
            isRestored: payload?.isRestored,
            countyName: String(payload?.countyName || "").trim() || "-",
            affectedUsers: payload?.affectedUsers,
            affectedConsCnt: payload?.affectedConsCnt,
            enableFocusMark: Boolean(payload?.enableFocusMark),
        };

        const candidates = [
            { devId, devType, provinceId, distribution },
            { devId, devType },
            { devId },
        ].filter((item, index) => index === 0 ? Boolean(item.devType) : true);

        const flyResult = flyChainCandidates(candidates);
        if (!activeSpaceDistributionDevice.enableFocusMark) {
            return;
        }

        const markCenter = function (delay) {
            window.setTimeout(function () {
                setOutageFocusMarker(getMapCenterLngLat(), activeSpaceDistributionDevice);
            }, delay);
        };
        const scheduleFocusMark = function () {
            [120, 420, 900, 1500, 2300].forEach(markCenter);
        };

        if (flyResult && typeof flyResult.then === "function") {
            flyResult
                .then(function () {
                    markCenter(160);
                })
                .catch(function () {
                    markCenter(160);
                });
        }

        scheduleFocusMark();
    }

    function normalizeRegionName(name) {
        return String(name ?? "")
            .replaceAll("国网", "")
            .replaceAll("供电公司", "")
            .replaceAll("供电中心", "")
            .replaceAll("公司", "")
            .replaceAll(" ", "")
            .replaceAll("　", "")
            .replace(/^唐山市?/, "")
            .trim();
    }

    function getCountyGridUnitByName(countyName) {
        const target = normalizeRegionName(countyName);
        if (!target || countyGridUnits.length === 0) {
            return null;
        }

        const exact = countyGridUnits.find((item) => {
            if (!item) {
                return false;
            }
            const candidates = [item.shortName, item.orgName, item.name];
            return candidates.some((candidate) => normalizeRegionName(candidate) === target);
        });
        if (exact) {
            return exact;
        }

        return (
            countyGridUnits.find((item) => {
                if (!item) {
                    return false;
                }
                const candidates = [item.shortName, item.orgName, item.name];
                return candidates.some((candidate) => {
                    const normalized = normalizeRegionName(candidate);
                    return Boolean(normalized) && (normalized.includes(target) || target.includes(normalized));
                });
            }) || null
        );
    }

    function highlightTangshanArea() {
        if (!powerManageGridMap || typeof powerManageGridMap.highLight !== "function") {
            return;

        try {
            powerManageGridMap.highLight({ orgIds: [defaultOrgId], level: 2 });

    function applyCountyFocus(payload) {
        pendingCountyFocusPayload = payload ?? null;
        if (!mapInstance) {
            return;
        }

        const countyName = String(payload?.countyName || "").trim();
        const lngLat = Array.isArray(payload?.lngLat) ? payload.lngLat : null;
        if (!countyName || countyName === "全部") {
            highlightTangshanArea();
            if (typeof mapInstance.setCenter === "function") {
                mapInstance.setCenter(defaultCenter);
            }
            if (typeof mapInstance.setZoom === "function") {
                mapInstance.setZoom(8);
            }
            return;
        }

        if (powerManageGridMap && countyGridReady) {
            const matchedUnit = getCountyGridUnitByName(countyName);
            if (matchedUnit?.orgId) {
                try {
                    if (typeof powerManageGridMap.locate === "function") {
                        powerManageGridMap.locate({ orgId: matchedUnit.orgId });
                    }
                    if (typeof powerManageGridMap.highLight === "function") {
                        powerManageGridMap.highLight({ orgIds: [matchedUnit.orgId], level: 3 });
                    }
                    return;
                } catch (error) {
                    console.warn("highlight county area failed", error);
                }
            }
        }

        if (lngLat) {
            if (typeof mapInstance.setCenter === "function") {
                mapInstance.setCenter(lngLat);
            }
            if (typeof mapInstance.setZoom === "function") {
                mapInstance.setZoom(9);
            }
        }
    }

    function initManageGridModule() {
        if (!mapInstance || !narimap?.ManageGrid?.PowerManageGridMap) {
            countyGridReady = true;
            applyCountyFocus(pendingCountyFocusPayload);
            return;
        }

        powerManageGridMap = new narimap.ManageGrid.PowerManageGridMap(mapInstance);
        try {
            powerManageGridMap.init(
                { theme: "light" },
                {
                    initOrgIds: [sessionStorage.getItem("PCPU_orgId") || defaultOrgId],
                    cascade: true,
                    locate: false
                }
            );
        } catch (error) {
            console.warn("manage grid init failed", error);
        }

        if (typeof powerManageGridMap.query !== "function") {
            countyGridReady = true;
            applyCountyFocus(pendingCountyFocusPayload);
            return;
        }

        powerManageGridMap.query(
            {
                orgIds: [sessionStorage.getItem("PCPU_orgId") || defaultOrgId],
                queryChildren: true,
                level: 2
            },
            function (res) {
                const list = Array.isArray(res) ? res : [];
                countyGridUnits = list.filter((item) => item && item.orgId);
                countyGridReady = true;
                applyCountyFocus(pendingCountyFocusPayload);
            },
            function (error) {
                console.warn("manage grid query failed", error);
                countyGridUnits = [];
                countyGridReady = true;
                applyCountyFocus(pendingCountyFocusPayload);
            }
        );
    }

        }

        let popup = null;
        try {
            popup = new PopupCtor({
                closeButton: false,
                closeOnClick: false,
                anchor: "bottom",
                offset: [0, -18],
                maxWidth: "420px",
            });
        } catch (_error) {
            popup = new PopupCtor();
        }

        const content = getCountyPopupContent(countyStat);

        if (typeof popup.setHTML === "function") {
            popup.setHTML(content);
        } else if (typeof popup.setHtml === "function") {
            popup.setHtml(content);
        }
        if (typeof popup.setLngLat === "function") {
            popup.setLngLat(countyStat.lngLat);
        }
        if (typeof popup.addTo === "function") {
            popup.addTo(mapInstance);
        }
        return popup;
    }

    function renderCountyPopups(countyStats = []) {
        clearCountyPopup();
        const stats = Array.isArray(countyStats) ? countyStats : [];
        keyUserCountyPopups = stats
            .filter((item) => item && Array.isArray(item.lngLat))
            .map((item) => createCountyPopup(item))
            .filter(Boolean);
    }

    function applyCountyMarkers(countyStats = []) {
        pendingCountyStats = Array.isArray(countyStats) ? countyStats : [];
        if (!mapInstance) {
            return;
        }

        clearCountyMarkers();
        if (!pendingCountyStats.length) {
            return;
        }

        const MarkerCtor = getMarkerConstructor();
        if (!MarkerCtor) {
            return;
        }

        pendingCountyStats.forEach((countyStat) => {
            if (!countyStat || !Array.isArray(countyStat.lngLat)) {
                return;
            }

            const markerElement = createCountyMarkerElement(Boolean(countyStat.active));
            let marker = null;
            try {
                marker = new MarkerCtor({ element: markerElement, anchor: "center" });
            } catch (_error) {
                try {
                    marker = new MarkerCtor(markerElement);
                } catch (_error2) {
                    marker = null;
                }
            }
            if (!marker) {
                return;
            }

            if (typeof marker.setLngLat === "function") {
                marker.setLngLat(countyStat.lngLat);
            }
            if (typeof marker.addTo === "function") {
                marker.addTo(mapInstance);
            }

            if (typeof marker.on === "function") {
                marker.on("click", () => openCountyPopup(countyStat));
            } else if (typeof marker.getElement === "function") {
                const node = marker.getElement();
                if (node) {
                    node.addEventListener("click", () => openCountyPopup(countyStat));
                }
            } else {
                markerElement.addEventListener("click", () => openCountyPopup(countyStat));
            }

            keyUserCountyMarkers.push({
                marker,
                countyName: countyStat.countyName || "",
            });
            keyUserCountyMarkerNodes.push({
                node: markerElement,
                countyName: countyStat.countyName || "",
            });
        });

        const activeCounty = pendingCountyStats.find((item) => item?.active);
        setActiveCountyMarker(activeCounty?.countyName || "");
        renderCountyPopups(pendingCountyStats);
    }

    function handleParentMessage(event) {
        const type = event?.data?.type;
        if (!type) {
            return;
        }

        if (type === keyUserCountyMarkersMessageType) {
            applyCountyMarkers(event?.data?.payload || []);
            return;
        }

        if (type === keyUserCountyMarkersClearMessageType) {
            pendingCountyStats = [];
            clearCountyMarkers();
            return;
        }

        if (type === mapCountyFocusMessageType) {
            applyCountyFocus(event?.data?.payload || null);
            return;
        }

        if (type === mapOutageFeederLocateMessageType) {
            locateOutageFeeder(event?.data?.payload || null);
            return;
        }

        if (type === mapOutageChainLocateMessageType) {
            locateOutageChain(event?.data?.payload || null);
            return;
        }

        if (type === mapSpaceDeviceLocateMessageType) {
            locateSpaceDistributionDevice(event?.data?.payload || null);
        }
    }

    window.addEventListener("message", handleParentMessage);

    function initMap(styleUrl) {
        mapInstance = new narimap.Map({
            container: "map",
            style: styleUrl,
            zoom: 8,
            center: defaultCenter,
            localIdeographFontFamily: "Microsoft YaHei"
        });
        initPowerGridLayer(mapInstance);
        applyTangshanHighlight(mapInstance);
        initManageGridModule();
        if (pendingCountyStats.length > 0) {
            applyCountyMarkers(pendingCountyStats);
        }
        applyCountyFocus(pendingCountyFocusPayload);
        locateOutageFeeder(pendingFeederLocatePayload);
        locateOutageChain(pendingChainLocatePayload);
        locateSpaceDistributionDevice(pendingSpaceDeviceLocatePayload);
        window.parent.postMessage({ type: keyUserMapReadyMessageType }, window.location.origin);
    }

    function applyTangshanHighlight(map) {
        let highlighted = false;
        const renderHighlight = function () {
            if (highlighted || !map || typeof map.addSource !== "function" || typeof map.addLayer !== "function") {
                return;
            }
            highlighted = true;
            try {
                if (map.getLayer && map.getLayer(tangshanHighlightLineLayerId)) {
                    map.removeLayer(tangshanHighlightLineLayerId);
                }
                if (map.getLayer && map.getLayer(tangshanHighlightFillLayerId)) {
                    map.removeLayer(tangshanHighlightFillLayerId);
                }
                if (map.getSource && map.getSource(tangshanHighlightSourceId)) {
                    map.removeSource(tangshanHighlightSourceId);
                }

                map.addSource(tangshanHighlightSourceId, {
                    type: "geojson",
                    data: tangshanBoundaryGeoJson
                });

                map.addLayer({
                    id: tangshanHighlightFillLayerId,
                    type: "fill",
                    source: tangshanHighlightSourceId,
                    paint: {
                        "fill-color": "#1A79DD",
                        "fill-opacity": 0.25
                    }
                });

                map.addLayer({
                    id: tangshanHighlightLineLayerId,
                    type: "line",
                    source: tangshanHighlightSourceId,
                    paint: {
                        "line-color": "#5BC6FF",
                        "line-width": 2.5,
                        "line-opacity": 0.95
                    }
                });
            } catch (error) {
                console.error("Tangshan highlight render error", error);
            }
        };

        if (typeof map.once === "function") {
            map.once("style.load", renderHighlight);
            map.once("load", renderHighlight);
            return;
        }
        renderHighlight();
    }

    function initPowerGridLayer(map) {
        const renderPowerGrid = function () {
            if (psrMapInstance || !map || !narimap?.PSRMap) {
                return;
            }
            try {
                psrMapInstance = new narimap.PSRMap(map);
                psrMapInstance.addPSR([900, 901, 902, 903]);
                bindOutageChainSubstationClickPopup();
                locateOutageFeeder(pendingFeederLocatePayload);
                locateOutageChain(pendingChainLocatePayload);
                locateSpaceDistributionDevice(pendingSpaceDeviceLocatePayload);
            } catch (error) {
                console.error("Power grid layer render error", error);
            }
        };

        if (typeof map.once === "function") {
            map.once("style.load", renderPowerGrid);
            map.once("load", renderPowerGrid);
            return;
        }
        renderPowerGrid();
    }

    function start() {
        narimap.Require(["Marker", "Popup", "ManageGrid", "PSRMap"], function () {
            if (narimap.Config.examples.notlogin) {
                initMap(narimap.Config.styles.sjDark);
                return;
            }

            narimap.SGAuth.login()
                .then(function () {
                    initMap(narimap.Config.styles.sjDark);
                })
                .catch(function (err) {
                    console.error("SGAuth login error", err);
                    alert("地图登录失败，请检查账户权限或网络。");
                });
        });
    }

    start();
</script>
